        ctx.font = "900 " + floater.size + "px Trebuchet MS, Arial";
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(0, 0, 0, 0.95)";
        ctx.fillStyle = floater.color;
        ctx.strokeText(floater.text, floater.x, floater.y);
        ctx.fillText(floater.text, floater.x, floater.y);
        ctx.restore();
      }
    }

    function drawBuffLabels() {
      const player = game.player;
      if (!player) return;
      const labels = [];
      if (player.powerTimer > 0) labels.push(["POWER", "#ffd45a", player.powerTimer]);
      if (player.speedTimer > 0) labels.push(["SPEED", "#c084fc", player.speedTimer]);
      if (player.invincible > 1) labels.push(["SHIELD", "#38bdf8", player.invincible]);
      if (!labels.length) return;

      ctx.save();
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.font = "900 13px Trebuchet MS, Arial";
      labels.forEach((label, index) => {
        const x = 16 + index * 92;
        const y = 72;
        ctx.fillStyle = "rgba(17, 19, 24, 0.82)";
        ctx.strokeStyle = "#111318";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(x, y, 80, 24, 5);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = label[1];
        ctx.fillText(label[0] + " " + Math.ceil(label[2]), x + 8, y + 13);
      });
      ctx.restore();
    }

    function handleKeyDown(event) {
      // 종료 화면: nameInput에 포커스된 경우만 키 허용 (Enter로 저장)
      if (game.mode === "end") {
        const inNameInput = document.activeElement === els.nameInput;
        if (inNameInput) {
          if (event.code === "Enter") {
            event.preventDefault();
            saveName();
          }
          // 그 외 입력은 input에 흘려보냄 (preventDefault 안 함)
          return;
        }
        // 그 외 키는 차단
        event.preventDefault();
        return;
      }

      const gameKeys = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight",
        "KeyW", "KeyA", "KeyS", "KeyD", "Space", "ShiftLeft", "ShiftRight", "Enter"];
      if (gameKeys.includes(event.code)) event.preventDefault();
      keys.add(event.code);

      if (event.repeat) return;

      // 인트로: 아무 키나 눌러도 시작 (단, PRESS ANY KEY 등장 후)
      if (game.mode === "intro" || game.mode === "start") {
        startGame();
        return;
      }

      if (game.mode === "playing") {
        if (event.code === "Space") tryAttack();
        if (event.code === "ShiftLeft" || event.code === "ShiftRight") tryDash();
      }
    }

    function handleKeyUp(event) {
      if (game.mode === "end") {
        if (document.activeElement !== els.nameInput) event.preventDefault();
        return;
      }
      keys.delete(event.code);
    }

    function saveName() {
      const name = els.nameInput.value.trim().toUpperCase().slice(0, 12) || "UNKNOWN";
      commitLeaderboardEntry(name);
      els.nameInputArea.classList.add("hidden");
    }

    function quitToStart() {
      keys.clear();
      pendingEntry = null;
      goToIntro();
    }

    function frame(now) {
      const realDt = Math.min(0.034, (now - lastFrame) / 1000);
      lastFrame = now;
      if (game.mode === "playing") {
        const simDt = game.slowMo > 0 ? realDt * 0.38 : realDt;
        updateGame(simDt, realDt);
      }
      if (game.mode === "intro") {
        updateIntro(realDt);
      }
      draw();
      requestAnimationFrame(frame);
    }

    window.addEventListener("keydown", handleKeyDown, { passive: false });
    window.addEventListener("keyup", handleKeyUp);
    if (els.startButton) els.startButton.addEventListener("click", startGame);
    els.restartButton.addEventListener("click", startGame);
    els.quitButton.addEventListener("click", quitToStart);
    els.nameSaveBtn.addEventListener("click", saveName);

    // 인트로 화면에서 캔버스 클릭으로도 시작 가능
    canvas.addEventListener("click", () => {
      if (game.mode === "intro") startGame();
    });

    bestScore = loadBestScore();
    updateHud();
    goToIntro();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
