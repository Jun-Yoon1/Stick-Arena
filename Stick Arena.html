<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stick Rush Arena</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #050608;
      --paper: #0a0d12;
      --panel: rgba(8, 10, 14, 0.92);
      --line: rgba(255, 80, 80, 0.25);
      --accent: #ff3838;
      --danger: #ff1a1a;
      --good: #55e080;
      --gold: #ffd45a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 30, 30, 0.18), transparent 30%),
        radial-gradient(circle at 78% 82%, rgba(150, 0, 0, 0.22), transparent 32%),
        linear-gradient(135deg, #0a0508 0%, #0f0709 46%, #050304 100%);
      color: #fff;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .game-shell {
      position: relative;
      width: min(100%, 1040px);
      aspect-ratio: 16 / 9;
      border: 4px solid #1a0205;
      border-radius: 8px;
      overflow: hidden;
      background: #0a0d12;
      box-shadow:
        0 22px 60px rgba(0, 0, 0, 0.7),
        0 0 80px rgba(255, 0, 0, 0.15),
        inset 0 0 0 2px rgba(255, 50, 50, 0.18);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: var(--paper);
    }

    /* ===== HUD — 캔버스 하단 얇은 한 줄 바 ===== */
    .hud {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 0;
      pointer-events: none;
      background: linear-gradient(to top, rgba(5,2,3,0.92) 0%, rgba(5,2,3,0.7) 70%, transparent 100%);
      padding: 0 10px;
    }

    .hud-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 10px;
      border-right: 1px solid rgba(255,50,50,0.2);
      height: 100%;
      white-space: nowrap;
    }
    .hud-item:last-child { border-right: none; }

    .hud-label {
      color: rgba(255,100,100,0.7);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .hud-value {
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
    }

    /* HP 바는 hud 안에서 가로로 */
    .health-wrap {
      position: relative;
      width: 100px;
      height: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
    }
    .health-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #25d366, #c9f75b);
      transform-origin: left center;
      transition: width 0.12s linear;
    }
    .health-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 9px;
      font-weight: 900;
      text-shadow: 1px 1px 0 #000;
    }

    /* 시간 위급 */
    #timeVal.warning { color: #ff3333; animation: timePulse 0.5s infinite alternate; }
    @keyframes timePulse { from { opacity: 1; } to { opacity: 0.4; } }

    /* 순위 Top3 강조 */
    #rankVal.rank-top { color: #ffd45a; text-shadow: 0 0 8px rgba(255,212,90,0.8); }

    /* 콤보 강조 */
    #comboVal.hot { color: #ff6633; text-shadow: 0 0 6px rgba(255,100,0,0.8); }

    /* 힌트 스트립 */
    .hint-strip {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 42px;   /* HUD 바 위에 */
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    .hint-strip span {
      padding: 4px 12px;
      border: 1px solid rgba(255,50,50,0.3);
      border-radius: 5px;
      background: rgba(8,5,8,0.75);
      color: rgba(255,200,200,0.7);
      font-size: 11px;
      font-weight: 800;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(180deg, rgba(18, 20, 25, 0.18), rgba(18, 20, 25, 0.5)),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035) 0 2px, transparent 2px 5px);
    }

    .screen.hidden,
    .hud.hidden,
    .hint-strip.hidden {
      display: none;
    }

    .menu-card {
      width: min(620px, 100%);
      padding: 28px;
      border: 4px solid #ff1a1a;
      border-radius: 8px;
      background: rgba(8, 5, 8, 0.96);
      color: #fff;
      box-shadow: 10px 10px 0 rgba(255, 0, 0, 0.25), 0 0 60px rgba(255, 0, 0, 0.3);
      text-align: center;
    }

    .menu-card h1,
    .menu-card h2 {
      margin: 0 0 10px;
      color: #fff;
      font-size: clamp(34px, 7vw, 72px);
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 3px 3px 0 #ff1a1a, 6px 6px 0 rgba(0, 0, 0, 0.8);
    }

    .menu-card h2 {
      font-size: clamp(30px, 6vw, 58px);
    }

    .tagline {
      margin: 0 0 18px;
      color: #ffaaaa;
      font-size: 17px;
      font-weight: 900;
    }

    .rules {
      display: grid;
      gap: 8px;
      margin: 16px 0 20px;
      padding: 14px;
      border: 3px solid #ff1a1a;
      border-radius: 7px;
      background: rgba(30, 5, 8, 0.85);
      color: #ffe0e0;
      text-align: left;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.45;
    }

    .start-button {
      min-width: 210px;
      min-height: 46px;
      padding: 10px 22px;
      border: 3px solid #ff1a1a;
      border-radius: 7px;
      background: #1a0205;
      color: #ff5050;
      cursor: pointer;
      font: inherit;
      font-size: 18px;
      font-weight: 1000;
      letter-spacing: 1px;
      box-shadow: 0 6px 0 #4a0008;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.12s, color 0.12s;
    }

    .start-button:hover {
      background: #ff1a1a;
      color: #fff;
    }

    .start-button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #4a0008;
    }

    .end-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin: 10px 0 12px;
    }

    .end-stat {
      padding: 6px 8px;
      border: 2px solid #ff1a1a;
      border-radius: 6px;
      background: rgba(20, 5, 8, 0.9);
    }

    .end-stat strong {
      display: block;
      color: #ffd45a;
      font-size: 18px;
      line-height: 1;
    }

    .end-stat span {
      display: block;
      margin-top: 3px;
      color: #ffaaaa;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .menu-card-wide {
      width: min(700px, 100%);
      padding: 18px 24px 20px;
    }

    .menu-card-wide h2 {
      font-size: clamp(22px, 4vw, 40px);
      margin-bottom: 4px;
    }

    .menu-card-wide .tagline {
      font-size: 13px;
      margin: 0 0 8px;
    }

    /* 제목 + 인라인 RESTART 행 */
    .end-title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 4px;
    }
    .end-title-row h2 {
      margin: 0;
    }

    .btn-inline-restart {
      min-width: auto;
      min-height: auto;
      padding: 7px 18px;
      font-size: 14px;
      letter-spacing: 1px;
      box-shadow: 0 4px 0 #4a0008;
      flex-shrink: 0;
    }

    /* ===== 리더보드 ===== */
    .leaderboard {
      margin: 8px 0 12px;
      padding: 10px 12px;
      border: 3px solid #ff1a1a;
      border-radius: 7px;
      background: rgba(15, 5, 8, 0.85);
      text-align: left;
    }

    .leaderboard-title {
      text-align: center;
      color: #ffd45a;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 4px;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(255, 212, 90, 0.6);
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 180px;
      overflow-y: auto;
    }

    .leaderboard-list::-webkit-scrollbar {
      width: 6px;
    }
    .leaderboard-list::-webkit-scrollbar-track {
      background: rgba(255, 30, 30, 0.1);
    }
    .leaderboard-list::-webkit-scrollbar-thumb {
      background: rgba(255, 30, 30, 0.5);
      border-radius: 3px;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 34px 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 4px 8px;
      border: 1px solid rgba(255, 50, 50, 0.2);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.4);
      font-size: 12px;
      font-weight: 800;
    }

    .leaderboard-row.current {
      border-color: #ffd45a;
      background: rgba(255, 212, 90, 0.12);
      box-shadow: 0 0 12px rgba(255, 212, 90, 0.4);
      animation: rowGlow 0.6s infinite alternate;
    }
    @keyframes rowGlow {
      from { box-shadow: 0 0 12px rgba(255, 212, 90, 0.3); }
      to { box-shadow: 0 0 20px rgba(255, 212, 90, 0.7); }
    }

    .leaderboard-row.top1 .lb-rank { color: #ffd45a; text-shadow: 0 0 8px rgba(255, 212, 90, 0.8); }
    .leaderboard-row.top2 .lb-rank { color: #c0c0c0; }
    .leaderboard-row.top3 .lb-rank { color: #cd7f32; }

    .lb-rank {
      font-size: 14px;
      font-weight: 900;
      color: #ff8888;
      text-align: center;
    }

    .lb-score {
      color: #fff;
      font-size: 13px;
    }

    .lb-name {
      color: #ffd45a;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 6px rgba(255,212,90,0.5);
    }

    .lb-meta {
      color: #ffaaaa;
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    .lb-result {
      font-size: 11px;
      font-weight: 900;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .lb-result.victory {
      background: #25d366;
      color: #000;
    }
    .lb-result.defeat {
      background: rgba(255, 50, 50, 0.3);
      color: #ff8888;
    }

    .leaderboard-empty {
      text-align: center;
      color: #888;
      padding: 20px;
      font-size: 13px;
      letter-spacing: 2px;
    }

    /* ===== Name 입력 영역 ===== */
    .name-input-area {
      margin: 6px 0 8px;
      padding: 10px 14px;
      border: 2px solid #ffd45a;
      border-radius: 7px;
      background: rgba(255, 212, 90, 0.08);
      box-shadow: 0 0 20px rgba(255, 212, 90, 0.25);
      animation: nameGlow 0.8s infinite alternate;
    }
    @keyframes nameGlow {
      from { box-shadow: 0 0 12px rgba(255,212,90,0.2); }
      to   { box-shadow: 0 0 28px rgba(255,212,90,0.5); }
    }
    .name-input-area.hidden { display: none; }

    .name-input-label {
      font-size: 13px;
      font-weight: 900;
      color: #ffd45a;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-align: center;
    }

    .name-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .name-input {
      flex: 1;
      max-width: 220px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      border: 2px solid #ffd45a;
      border-radius: 5px;
      color: #fff;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      outline: none;
      text-align: center;
    }
    .name-input::placeholder { color: rgba(255,212,90,0.35); letter-spacing: 2px; }
    .name-input:focus { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

    .name-save-btn {
      padding: 8px 20px;
      background: #ffd45a;
      color: #000;
      border: none;
      border-radius: 5px;
      font-family: "Trebuchet MS", Arial, sans-serif;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.08s, background 0.1s;
    }
    .name-save-btn:hover { background: #fff; transform: scale(1.05); }
    .name-save-btn:active { transform: scale(0.97); }

    /* ===== 종료 화면 버튼 그룹 ===== */
    .end-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .start-button-secondary {
      background: rgba(20, 5, 8, 0.9);
      color: #888;
      border-color: #555;
      box-shadow: 0 6px 0 #2a0408;
    }
    .start-button-secondary:hover {
      background: #555;
      color: #fff;
      border-color: #888;
    }

    .mouse-hint {
      margin-top: 14px;
      color: #888;
      font-size: 12px;
      letter-spacing: 2px;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      body {
        padding: 8px;
      }

      .hud {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .hud-card {
        min-height: 35px;
        padding: 6px 8px;
      }

      .hud-value {
        font-size: 14px;
      }

      .hint-strip span {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="Stick Rush Arena game">
    <canvas id="gameCanvas" width="960" height="540"></canvas>

    <section id="hud" class="hud hidden" aria-live="polite">
      <!-- HP -->
      <div class="hud-item">
        <span class="hud-label">HP</span>
        <div class="health-wrap">
          <div id="healthFill" class="health-fill"></div>
          <div id="healthText" class="health-text">100</div>
        </div>
      </div>
      <!-- 점수 -->
      <div class="hud-item">
        <span class="hud-label">SCORE</span>
        <span id="scoreText" class="hud-value">0</span>
      </div>
      <!-- 순위 -->
      <div class="hud-item">
        <span class="hud-label">RANK</span>
        <span id="rankVal" class="hud-value">-</span>
      </div>
      <!-- 시간 -->
      <div class="hud-item">
        <span class="hud-label">TIME</span>
        <span id="timeVal" class="hud-value">90</span>
      </div>
      <!-- 콤보 -->
      <div class="hud-item">
        <span class="hud-label">COMBO</span>
        <span id="comboVal" class="hud-value">x0</span>
      </div>
      <!-- 최고점수 (우측에 flex push) -->
      <div class="hud-item" style="margin-left:auto; border-right:none; border-left:1px solid rgba(255,50,50,0.2);">
        <span class="hud-label">BEST</span>
        <span id="bestText" class="hud-value">0</span>
      </div>
    </section>

    <div id="hintStrip" class="hint-strip hidden">
      <span>WASD / 방향키 이동 · Space 공격 · Shift 대시 · 90초 생존</span>
    </div>

    <section id="startScreen" class="screen hidden">
      <!-- 인트로는 Canvas에서 직접 렌더링, 이 섹션은 사용 안 함 -->
    </section>

    <section id="endScreen" class="screen hidden">
      <div class="menu-card menu-card-wide">
        <!-- 제목 행: GAME OVER / 승리 + 우측 RESTART -->
        <div class="end-title-row">
          <h2 id="endTitle">승리</h2>
          <button id="restartButton" class="start-button btn-inline-restart" type="button">▶ RESTART</button>
        </div>
        <p id="endMessage" class="tagline">아레나를 버텨냈습니다.</p>
        <div class="end-stats">
          <div class="end-stat">
            <strong id="finalScoreText">0</strong>
            <span>최종 점수</span>
          </div>
          <div class="end-stat">
            <strong id="finalKillsText">0</strong>
            <span>처치 수</span>
          </div>
          <div class="end-stat">
            <strong id="finalComboText">x0</strong>
            <span>최대 콤보</span>
          </div>
          <div class="end-stat">
            <strong id="finalRankText">-</strong>
            <span>순위</span>
          </div>
        </div>

        <!-- Name 입력 (Top5 달성 시만 표시) -->
        <div id="nameInputArea" class="name-input-area hidden">
          <div class="name-input-label">🏆 TOP 5 진입! 이름을 입력하세요</div>
          <div class="name-input-row">
            <input id="nameInput" class="name-input" type="text" maxlength="12" placeholder="YOUR NAME" spellcheck="false" autocomplete="off">
            <button id="nameSaveBtn" class="name-save-btn" type="button">SAVE</button>
          </div>
        </div>

        <!-- 리더보드 Top 5 -->
        <div class="leaderboard">
          <div class="leaderboard-title">★ TOP 5 ★</div>
          <div id="leaderboardList" class="leaderboard-list"></div>
        </div>

        <div class="end-buttons">
          <button id="quitButton" class="start-button start-button-secondary" type="button">QUIT</button>
        </div>
        <div class="mouse-hint">마우스 클릭으로 선택 · 키보드 입력 차단됨 (이름 입력 제외)</div>
      </div>
    </section>

    <!-- Name 입력 모달 CSS는 style에, 여기는 HTML 끝 -->

  </main>

  <script>
    "use strict";

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;
    const GAME_DURATION = 90;
    const STORAGE_KEY = "stickRushArenaBestScoreV1";
    const LEADERBOARD_KEY = "stickRushArenaLeaderboardV1";
    const LEADERBOARD_MAX = 5; // Top 5만 유지

    const els = {
      hud: document.getElementById("hud"),
      hint: document.getElementById("hintStrip"),
      startScreen: document.getElementById("startScreen"),
      endScreen: document.getElementById("endScreen"),
      startButton: document.getElementById("startButton"), // 인트로 캔버스로 대체됨(null 가능)
      restartButton: document.getElementById("restartButton"),
      healthFill: document.getElementById("healthFill"),
      healthText: document.getElementById("healthText"),
      scoreText: document.getElementById("scoreText"),
      rankVal: document.getElementById("rankVal"),
      timeVal: document.getElementById("timeVal"),
      comboVal: document.getElementById("comboVal"),
      bestText: document.getElementById("bestText"),
      endTitle: document.getElementById("endTitle"),
      endMessage: document.getElementById("endMessage"),
      finalScoreText: document.getElementById("finalScoreText"),
      finalKillsText: document.getElementById("finalKillsText"),
      finalComboText: document.getElementById("finalComboText"),
      finalRankText: document.getElementById("finalRankText"),
      leaderboardList: document.getElementById("leaderboardList"),
      nameInputArea: document.getElementById("nameInputArea"),
      nameInput: document.getElementById("nameInput"),
      nameSaveBtn: document.getElementById("nameSaveBtn"),
      quitButton: document.getElementById("quitButton")
    };

    const keys = new Set();
    let audioCtx = null;
    let masterGain = null;
    let lastFrame = performance.now();
    let nextEntityId = 1;
    let bestScore = loadBestScore();

    const game = {
      mode: "intro",
      player: null,
      enemies: [],
      attacks: [],
      items: [],
      particles: [],
      floaters: [],
      elapsed: 0,
      timeLeft: GAME_DURATION,
      score: 0,
      kills: 0,
      combo: 0,
      comboTimer: 0,
      maxCombo: 0,
      spawnTimer: 0,
      itemTimer: 0,
      slowMo: 0,
      shake: 0,
      flash: 0,
      finalScore: 0
    };

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function formatScore(value) {
      return Math.round(value).toLocaleString("ko-KR");
    }

    function loadBestScore() {
      try {
        return Number(localStorage.getItem(STORAGE_KEY)) || 0;
      } catch (error) {
        return 0;
      }
    }

    function saveBestScore(value) {
      try {
        localStorage.setItem(STORAGE_KEY, String(value));
      } catch (error) {
        // localStorage가 막힌 환경에서도 게임 진행은 계속됩니다.
      }
    }

    // ===== 리더보드 (Top 5) =====
    function loadLeaderboard() {
      try {
        const raw = localStorage.getItem(LEADERBOARD_KEY);
        if (!raw) return [];
        const data = JSON.parse(raw);
        return Array.isArray(data) ? data : [];
      } catch (e) { return []; }
    }

    function saveLeaderboard(list) {
      try { localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(list)); }
      catch (e) { /* 무시 */ }
    }

    // 점수가 Top5에 드는지 확인 (드는 경우 예상 순위 반환, 아니면 -1)
    function getEntryRank(score) {
      const list = loadLeaderboard();
      if (list.length < LEADERBOARD_MAX) return list.filter(e => e.score >= score).length + 1;
      const minScore = list[list.length - 1].score;
      if (score <= minScore) return -1;
      return list.filter(e => e.score >= score).length + 1;
    }

    // 리더보드에 엔트리 추가 (name은 나중에 채워짐). 진입 순위 반환, 진입 못하면 -1
    let pendingEntry = null; // name 미입력 상태의 임시 엔트리
    function addToLeaderboard(score, kills, maxCombo, victory) {
      const rank = getEntryRank(score);
      if (rank === -1) return -1;

      const entry = { score, kills, maxCombo, victory, name: "", date: Date.now() };
      pendingEntry = { entry, rank };
      return rank;
    }

    // name 확정 후 실제 저장
    function commitLeaderboardEntry(name) {
      if (!pendingEntry) return;
      const { entry } = pendingEntry;
      entry.name = name.trim().toUpperCase().slice(0, 12) || "UNKNOWN";
      const list = loadLeaderboard();
      list.push(entry);
      list.sort((a, b) => b.score - a.score);
      saveLeaderboard(list.slice(0, LEADERBOARD_MAX));
      pendingEntry = null;
      renderLeaderboard(entry.score);
    }

    // 현재 진행 중 점수의 예상 순위 (인게임 HUD용)
    function getCurrentRank(score) {
      const list = loadLeaderboard();
      if (list.length === 0) return score > 0 ? 1 : -1;
      const rank = list.filter(e => e.score >= score).length + 1;
      return rank <= LEADERBOARD_MAX ? rank : -1;
    }

    function ensureAudio() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          audioCtx = new AudioContextClass();
          // 마스터 게인 (전체 볼륨 조절용)
          masterGain = audioCtx.createGain();
          masterGain.gain.value = 0.78;
          masterGain.connect(audioCtx.destination);
        }
      }
      if (audioCtx && audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function tone(freq, duration, type = "sine", gain = 0.05, slide = 0, delay = 0) {
      if (!audioCtx) return;
      const start = audioCtx.currentTime + delay;
      const osc = audioCtx.createOscillator();
      const amp = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);
      if (slide) {
        osc.frequency.exponentialRampToValueAtTime(Math.max(45, freq + slide), start + duration);
      }
      amp.gain.setValueAtTime(0.0001, start);
      amp.gain.exponentialRampToValueAtTime(gain, start + 0.012);
      amp.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(amp).connect(masterGain || audioCtx.destination);
      osc.start(start);
      osc.stop(start + duration + 0.02);
    }

    function noiseBurst(duration = 0.08, gain = 0.04, filterFreq = 0) {
      if (!audioCtx) return;
      const sampleRate = audioCtx.sampleRate;
      const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i += 1) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      }
      const src = audioCtx.createBufferSource();
      const amp = audioCtx.createGain();
      amp.gain.value = gain;
      src.buffer = buffer;
      let node = src;
      if (filterFreq > 0) {
        const filter = audioCtx.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.value = filterFreq;
        src.connect(filter);
        node = filter;
      }
      node.connect(amp).connect(masterGain || audioCtx.destination);
      src.start();
    }

    function playSound(name) {
      ensureAudio();
      if (!audioCtx) return;
      if (name === "attack") {
        // 더 묵직한 휘두르는 소리: 노이즈 + 짧은 톤
        tone(180, 0.05, "square", 0.04, -120);
        noiseBurst(0.06, 0.04, 1500);
      } else if (name === "hit") {
        // 강한 타격 - 저주파 펀치 + 노이즈
        tone(80, 0.12, "sine", 0.18, -30);
        tone(160, 0.08, "sawtooth", 0.08, -80);
        noiseBurst(0.08, 0.06, 800);
      } else if (name === "crit") {
        // 크리티컬 - 더 강력한 타격
        tone(60, 0.18, "sine", 0.22, -20);
        tone(220, 0.1, "square", 0.1, -150);
        noiseBurst(0.12, 0.08, 600);
      } else if (name === "kill") {
        // 처치 사운드
        tone(440, 0.06, "square", 0.08);
        tone(660, 0.08, "square", 0.08, 0, 0.05);
        tone(880, 0.12, "triangle", 0.07, 0, 0.1);
      } else if (name === "hurt") {
        // 피격 - 거친 비명 같은 느낌
        tone(110, 0.18, "sawtooth", 0.1, -50);
        tone(75, 0.22, "triangle", 0.08, -25, 0.04);
        noiseBurst(0.1, 0.05, 400);
      } else if (name === "dash") {
        // 대시 - 빠른 휙
        tone(600, 0.08, "triangle", 0.05, -300);
        noiseBurst(0.06, 0.03, 2000);
      } else if (name === "item") {
        // 아이템 획득 - 밝은 톤
        tone(523, 0.08, "square", 0.06);
        tone(784, 0.1, "square", 0.06, 0, 0.06);
        tone(1047, 0.14, "triangle", 0.05, 0, 0.13);
      } else if (name === "spawn") {
        // 적 스폰 경고
        tone(180, 0.08, "sawtooth", 0.04, 80);
      } else if (name === "warning") {
        // 시간 경고
        tone(880, 0.08, "square", 0.06);
        tone(880, 0.08, "square", 0.06, 0, 0.12);
      } else if (name === "win") {
        // 승리 팡파르
        tone(523, 0.15, "square", 0.08);
        tone(659, 0.15, "square", 0.08, 0, 0.15);
        tone(784, 0.15, "square", 0.08, 0, 0.3);
        tone(1047, 0.4, "triangle", 0.1, 0, 0.45);
      } else if (name === "lose") {
        // 패배 - 어두운 하강
        tone(220, 0.2, "sawtooth", 0.1, -50);
        tone(165, 0.25, "sawtooth", 0.09, -40, 0.18);
        tone(110, 0.4, "triangle", 0.08, -30, 0.4);
      } else if (name === "combo3") {
        tone(800 + Math.random() * 200, 0.06, "triangle", 0.05);
      }
    }

    // ======= BGM (긴장감 있는 루프) =======
    let bgmInterval = null;
    let bgmStep = 0;

    // ===== BGM: 긴장감 넘치는 미니멀 테크노 루프 =====
    // 구조: 킥드럼 + 베이스라인 + 리드 멜로디 + 하이햇
    // 난이도에 따라 BPM 상승 + 레이어 추가
    function startBGM() {
      stopBGM();
      ensureAudio();
      if (!audioCtx) return;
      bgmStep = 0;

      // 베이스 음계: Am 펜타토닉 느낌 (긴장감)
      // A2=110, C3=130, D3=147, E3=165, G3=196
      const bassLine = [110, 0, 110, 0, 147, 0, 110, 0,   // bar 1
                        110, 0, 130, 0, 165, 0, 147, 0];   // bar 2

      // 리드 멜로디 (상위 옥타브, 긴장감 있는 단조 라인)
      // 16스텝 중 일부 스텝에서만 연주
      const leadLine = [0, 0, 220, 0, 0, 0, 294, 0,   // bar 1
                        0, 0, 261, 0, 220, 0, 0, 196]; // bar 2

      const tick = () => {
        if (!audioCtx || game.mode !== "playing") return;

        const difficulty = clamp(game.elapsed / GAME_DURATION, 0, 1);
        const step = bgmStep % 16;

        // ── 킥 드럼 (4박자 기본, 후반 더블킥) ──
        if (step === 0 || step === 8) {
          // 강한 서브 킥
          tone(55, 0.22, "sine", 0.22 + difficulty * 0.08, -40);
          noiseBurst(0.04, 0.07, 200);
        }
        if (difficulty > 0.5 && (step === 12)) {
          // 후반 더블킥
          tone(55, 0.15, "sine", 0.16, -35);
          noiseBurst(0.03, 0.05, 200);
        }

        // ── 스네어 / 클랩 (2, 6, 10, 14번째 스텝) ──
        if (step === 4 || step === 12) {
          noiseBurst(0.06, 0.12 + difficulty * 0.04, 1800);
          tone(180, 0.05, "square", 0.04);
        }
        // 후반 추가 스네어
        if (difficulty > 0.65 && (step === 6 || step === 14)) {
          noiseBurst(0.04, 0.07, 1800);
        }

        // ── 하이햇 (매 홀수 스텝) ──
        if (step % 2 === 1) {
          noiseBurst(0.025, 0.025 + difficulty * 0.02, 6000);
        }
        // 후반: 16분음표 하이햇 오픈 (더 빠른 느낌)
        if (difficulty > 0.7 && step % 4 === 3) {
          noiseBurst(0.06, 0.03, 4000);
        }

        // ── 베이스 라인 ──
        const bassNote = bassLine[step];
        if (bassNote > 0) {
          tone(bassNote, 0.18, "triangle", 0.13 + difficulty * 0.05, -8);
          // 사브 옥타브 보강
          tone(bassNote * 0.5, 0.22, "sine", 0.10 + difficulty * 0.04, -5);
        }

        // ── 리드 멜로디 (중반 이후 등장) ──
        if (difficulty > 0.3) {
          const leadNote = leadLine[step];
          if (leadNote > 0) {
            const leadVol = (difficulty - 0.3) / 0.7 * 0.08;
            tone(leadNote, 0.14, "square", leadVol, -10);
            // 에코 효과
            setTimeout(() => tone(leadNote, 0.1, "square", leadVol * 0.4, -15), 80);
          }
        }

        // ── 후반부 긴장감 상승: 고음 패드 ──
        if (difficulty > 0.7 && step % 8 === 0) {
          const padVol = (difficulty - 0.7) / 0.3 * 0.06;
          tone(440, 0.4, "sine", padVol, 0);
          tone(554, 0.4, "sine", padVol * 0.7, 0);
        }

        // ── HP 위급 심장박동 (박자에 맞춰) ──
        if (game.player && game.player.hp < 30 && step === 0) {
          tone(50, 0.12, "sine", 0.18);
          setTimeout(() => tone(50, 0.09, "sine", 0.13), 140);
        }

        bgmStep += 1;

        // BPM: 시작 145BPM(~413ms/16th) → 최대 185BPM(~324ms/16th)
        const intervalMs = Math.round(413 - difficulty * 89);
        bgmInterval = setTimeout(tick, intervalMs);
      };

      // 첫 박자 약간 딜레이 후 시작
      bgmInterval = setTimeout(tick, 100);
    }

    function stopBGM() {
      if (bgmInterval) {
        clearTimeout(bgmInterval);
        bgmInterval = null;
      }
    }

    function setScreen(mode) {
      game.mode = mode;
      // intro는 캔버스에서 직접 그림 - HTML 오버레이 모두 숨김
      els.startScreen.classList.add("hidden");
      els.endScreen.classList.toggle("hidden", mode !== "end");
      els.hud.classList.toggle("hidden", mode !== "playing");
      els.hint.classList.toggle("hidden", mode !== "playing");
    }

    function goToIntro() {
      // 인트로 상태 리셋
      intro.t = 0;
      intro.titleY = -120;
      intro.titleVY = 0;
      intro.titleLanded = false;
      intro.shockwave = 0;
      intro.redFlash = 0;
      intro.particles.length = 0;
      intro.player.attack = 0;
      intro.player.walk = 0;
      for (const e of intro.enemies) {
        e.x = W * (0.68 + Math.random() * 0.18);
        e.y = H * (0.60 + Math.random() * 0.08);
        e.state = "idle";
        e.stateT = Math.random() * 0.8;
        e.vx = 0; e.vy = 0;
      }
      game.mode = "intro";
      els.endScreen.classList.add("hidden");
      els.hud.classList.add("hidden");
      els.hint.classList.add("hidden");
    }

    function startGame() {
      ensureAudio();
      nextEntityId = 1;
      game.player = {
        id: 0,
        x: W / 2,
        y: H / 2 + 95,
        hp: 100,
        maxHp: 100,
        speed: 190,
        radius: 18,
        facing: 1,
        walk: 0,
        attackCooldown: 0,
        attackPose: 0,
        attackDirX: 1,
        attackDirY: 0,
        dashCooldown: 0,
        dashTime: 0,
        dashX: 1,
        dashY: 0,
        invincible: 0,
        hurtCooldown: 0,
        powerTimer: 0,
        speedTimer: 0
      };
      game.enemies = [];
      game.attacks = [];
      game.items = [];
      game.particles = [];
      game.floaters = [];
      game.spawnWarnings = [];
      game.elapsed = 0;
      game.timeLeft = GAME_DURATION;
      game.score = 0;
      game.kills = 0;
      game.combo = 0;
      game.comboTimer = 0;
      game.maxCombo = 0;
      game.spawnTimer = 0.45;
      game.itemTimer = rand(5.5, 8.5);
      game.slowMo = 0;
      game.shake = 0;
      game.flash = 0;
      game.finalScore = 0;
      game.lastTimeWarning = 0;
      setScreen("playing");
      updateHud();
      startBGM();
    }

    function endGame(victory) {
      if (game.mode !== "playing") return;
      stopBGM();
      const player = game.player;
      const killBonus = game.kills * 90;
      const healthBonus = Math.max(0, Math.round(player.hp * 18));
      const timeBonus = Math.ceil(game.timeLeft) * 20;
      const comboBonus = game.maxCombo * 75;
      const victoryBonus = victory ? 1800 : 0;
      game.finalScore = Math.max(0, Math.round(game.score + killBonus + healthBonus + timeBonus + comboBonus + victoryBonus));

      if (game.finalScore > bestScore) {
        bestScore = game.finalScore;
        saveBestScore(bestScore);
      }

      // Top5 진입 여부 확인 (아직 저장 안 함 — name 먼저)
      const myRank = addToLeaderboard(game.finalScore, game.kills, game.maxCombo, victory);

      els.endTitle.textContent = victory ? "승리" : "GAME OVER";
      els.endMessage.textContent = victory
        ? "90초를 버텨냈습니다. 다음 판은 더 높은 콤보를 노려보세요."
        : "영웅이 되지 못했습니다. 아레나로 돌아가시겠습니까?";
      els.finalScoreText.textContent = formatScore(game.finalScore);
      els.finalKillsText.textContent = formatScore(game.kills);
      els.finalComboText.textContent = "x" + game.maxCombo;
      els.finalRankText.textContent = myRank > 0 ? "#" + myRank : "—";
      els.bestText.textContent = formatScore(bestScore);

      // Top5 달성 시 이름 입력창 표시
      if (myRank > 0) {
        els.nameInputArea.classList.remove("hidden");
        els.nameInput.value = "";
        // 이름 입력창에 포커스 (키보드 차단 안 하고 input만 허용)
        setTimeout(() => els.nameInput.focus(), 200);
      } else {
        els.nameInputArea.classList.add("hidden");
        renderLeaderboard(-1);
      }

      setScreen("end");
      playSound(victory ? "win" : "lose");
    }

    function renderLeaderboard(currentScore) {
      const list = loadLeaderboard();
      const container = els.leaderboardList;
      if (!container) return;
      container.innerHTML = "";

      if (list.length === 0) {
        const empty = document.createElement("div");
        empty.className = "leaderboard-empty";
        empty.textContent = "기록 없음 — 첫 번째 챔피언이 되세요!";
        container.appendChild(empty);
        return;
      }

      // 빈 슬롯 포함해서 항상 5행 표시
      for (let idx = 0; idx < LEADERBOARD_MAX; idx += 1) {
        const entry = list[idx];
        const rank = idx + 1;
        const row = document.createElement("div");
        row.className = "leaderboard-row";
        if (rank === 1) row.classList.add("top1");
        else if (rank === 2) row.classList.add("top2");
        else if (rank === 3) row.classList.add("top3");

        // 현재 판 점수와 일치하는 최신 항목 강조
        if (entry && currentScore > 0 && entry.score === currentScore) {
          row.classList.add("current");
        }

        const medal = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : "#" + rank;

        if (!entry) {
          // 빈 슬롯
          row.innerHTML =
            '<div class="lb-rank" style="color:#333">' + medal + '</div>' +
            '<div><div class="lb-score" style="color:#333">— EMPTY —</div></div>' +
            '<div></div><div></div>';
        } else {
          const d = new Date(entry.date);
          const dateStr = (d.getMonth() + 1) + "/" + d.getDate() + " "
            + String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
          const nameStr = entry.name || "UNKNOWN";

          row.innerHTML =
            '<div class="lb-rank">' + medal + '</div>' +
            '<div>' +
              '<div class="lb-name">' + nameStr + '</div>' +
              '<div class="lb-score">' + formatScore(entry.score) + '</div>' +
              '<div class="lb-meta">KILL ' + entry.kills + ' · COMBO x' + entry.maxCombo + '</div>' +
            '</div>' +
            '<div class="lb-meta">' + dateStr + '</div>' +
            '<div class="lb-result ' + (entry.victory ? "victory" : "defeat") + '">' +
              (entry.victory ? "WIN" : "LOSE") +
            '</div>';
        }

        container.appendChild(row);
      }
    }

    function getMoveVector() {
      let x = 0;
      let y = 0;
      if (keys.has("ArrowLeft") || keys.has("KeyA")) x -= 1;
      if (keys.has("ArrowRight") || keys.has("KeyD")) x += 1;
      if (keys.has("ArrowUp") || keys.has("KeyW")) y -= 1;
      if (keys.has("ArrowDown") || keys.has("KeyS")) y += 1;
      const len = Math.hypot(x, y);
      if (len > 0) {
        x /= len;
        y /= len;
      }
      return { x, y };
    }

    function tryAttack() {
      const player = game.player;
      if (!player || player.attackCooldown > 0 || game.mode !== "playing") return;
      const move = getMoveVector();
      const dirX = move.x || player.facing;
      const dirY = move.x || move.y ? move.y : 0;
      const len = Math.hypot(dirX, dirY) || 1;
      const nx = dirX / len;
      const ny = dirY / len;
      player.attackCooldown = player.powerTimer > 0 ? 0.24 : 0.32;
      player.attackPose = 0.18;
      player.attackDirX = nx;
      player.attackDirY = ny;
      player.facing = nx < 0 ? -1 : nx > 0 ? 1 : player.facing;
      game.attacks.push({
        x: player.x + nx * 42,
        y: player.y - 10 + ny * 20,
        dirX: nx,
        dirY: ny,
        radius: player.powerTimer > 0 ? 72 : 62,
        damage: player.powerTimer > 0 ? 46 : 30,
        life: 0.16,
        maxLife: 0.16,
        hitIds: new Set()
      });
      spawnArcParticles(player.x + nx * 34, player.y - 12 + ny * 14, nx, ny, "#f8fbff");
      playSound("attack");
    }

    function tryDash() {
      const player = game.player;
      if (!player || player.dashCooldown > 0 || game.mode !== "playing") return;
      const move = getMoveVector();
      let dx = move.x;
      let dy = move.y;
      if (!dx && !dy) dx = player.facing;
      const len = Math.hypot(dx, dy) || 1;
      player.dashX = dx / len;
      player.dashY = dy / len;
      player.dashTime = 0.18;
      player.dashCooldown = 0.78;
      player.invincible = Math.max(player.invincible, 0.28);
      game.shake = Math.max(game.shake, 2);
      for (let i = 0; i < 10; i += 1) {
        addParticle(player.x - player.dashX * rand(0, 18), player.y + rand(-24, 20), -player.dashX * rand(80, 180), -player.dashY * rand(40, 120), "#b7efff", rand(0.16, 0.28), rand(3, 6));
      }
      playSound("dash");
    }

    function addCombo(amount = 1) {
      game.combo = clamp(game.combo + amount, 1, 99);
      game.comboTimer = 2.45;
      game.maxCombo = Math.max(game.maxCombo, game.combo);
    }

    function breakCombo() {
      game.combo = 0;
      game.comboTimer = 0;
    }

    function addScore(points, x, y, color = "#ffd45a") {
      const value = Math.max(0, Math.round(points));
      game.score += value;
      addFloater("+" + value, x, y, color, 18);
    }

    function damageEnemy(enemy, damage, dirX, dirY) {
      if (enemy.dead) return;
      enemy.hp -= damage;
      enemy.hurt = 0.16;
      enemy.x += dirX * 14;
      enemy.y += dirY * 10;
      addCombo(1);
      addScore(8 + game.combo * 3, enemy.x, enemy.y - 48, "#b7efff");
      spawnBurst(enemy.x, enemy.y - 22, enemy.type === "brute" ? "#f97316" : "#ff4d4d", 10);
      const isPower = game.player && game.player.powerTimer > 0;
      playSound(isPower ? "crit" : "hit");
      // 콤보 3 단위마다 추가 사운드
      if (game.combo > 1 && game.combo % 3 === 0) {
        playSound("combo3");
      }
      game.slowMo = Math.max(game.slowMo, 0.055);
      game.shake = Math.max(game.shake, enemy.type === "brute" ? 5 : 3.3);

      if (enemy.hp <= 0) {
        enemy.dead = true;
        game.kills += 1;
        const killPoints = 120 + game.combo * 22 + Math.floor(game.elapsed * 0.7);
        addScore(killPoints, enemy.x, enemy.y - 66, "#ffd45a");
        spawnBurst(enemy.x, enemy.y - 25, "#111318", 16);
        playSound("kill");
        if (Math.random() < 0.08) spawnItem(enemy.x, enemy.y, true);
      }
    }

    function damagePlayer(amount, fromEnemy) {
      const player = game.player;
      if (!player || player.invincible > 0 || player.hurtCooldown > 0) return;
      player.hp = Math.max(0, player.hp - amount);
      player.hurtCooldown = 0.5;
      player.invincible = 0.42;
      game.flash = 0.28;
      game.shake = Math.max(game.shake, 6);
      breakCombo();
      addFloater("-" + amount, player.x, player.y - 58, "#ff4d4d", 20);
      spawnBurst(player.x, player.y - 24, "#ff4d4d", 14);
      if (fromEnemy) {
        const dx = player.x - fromEnemy.x;
        const dy = player.y - fromEnemy.y;
        const len = Math.hypot(dx, dy) || 1;
        player.x += (dx / len) * 22;
        player.y += (dy / len) * 16;
      }
      playSound("hurt");
      if (player.hp <= 0) {
        player.hp = 0;
        updateHud();
        endGame(false);
      }
    }

    function spawnEnemy() {
      if (game.enemies.length > 34) return;
      const d = clamp(game.elapsed / GAME_DURATION, 0, 1);
      const roll = Math.random();
      let type = "normal";
      if (d > 0.18 && roll < 0.28) type = "runner";
      if (d > 0.42 && roll > 0.82) type = "brute";

      const edge = Math.floor(rand(0, 4));
      let x = 0;
      let y = 0;
      let warnX = 0;
      let warnY = 0;
      let warnAngle = 0;
      if (edge === 0) {
        x = rand(40, W - 40);
        y = 100;
        warnX = x; warnY = 130; warnAngle = -Math.PI / 2;
      } else if (edge === 1) {
        x = W + 34;
        y = rand(135, H - 70);
        warnX = W - 30; warnY = y; warnAngle = 0;
      } else if (edge === 2) {
        x = rand(40, W - 40);
        y = H + 34;
        warnX = x; warnY = H - 30; warnAngle = Math.PI / 2;
      } else {
        x = -34;
        y = rand(135, H - 70);
        warnX = 30; warnY = y; warnAngle = Math.PI;
      }

      // 스폰 경고 마커 추가
      if (!game.spawnWarnings) game.spawnWarnings = [];
      game.spawnWarnings.push({
        x: warnX, y: warnY, angle: warnAngle,
        life: 0.5, maxLife: 0.5
      });
      playSound("spawn");

      const stats = {
        normal: { hp: 48 + d * 24, speed: 76 + d * 34, damage: 8, radius: 18, color: "#d92d20" },
        runner: { hp: 32 + d * 16, speed: 116 + d * 44, damage: 6, radius: 16, color: "#13a36f" },
        brute: { hp: 96 + d * 50, speed: 52 + d * 18, damage: 15, radius: 22, color: "#f97316" }
      }[type];

      game.enemies.push({
        id: nextEntityId++,
        type,
        x,
        y,
        hp: stats.hp,
        maxHp: stats.hp,
        speed: stats.speed,
        damage: stats.damage,
        radius: stats.radius,
        color: stats.color,
        attackCooldown: rand(0.15, 0.65),
        hurt: 0,
        walk: rand(0, 10),
        dead: false
      });
    }

    function spawnItem(x = rand(70, W - 70), y = rand(145, H - 82), fromEnemy = false) {
      if (game.items.length > 4 && !fromEnemy) return;
      const types = ["heal", "power", "shield", "haste"];
      const type = types[Math.floor(rand(0, types.length))];
      game.items.push({
        id: nextEntityId++,
        type,
        x: clamp(x + rand(-20, 20), 55, W - 55),
        y: clamp(y + rand(-16, 16), 135, H - 72),
        life: fromEnemy ? 9 : 12,
        age: 0
      });
    }

    function applyItem(item) {
      const player = game.player;
      if (item.type === "heal") {
        player.hp = Math.min(player.maxHp, player.hp + 28);
        addFloater("HEAL", player.x, player.y - 72, "#55e080", 18);
      } else if (item.type === "power") {
        player.powerTimer = 8;
        addFloater("POWER", player.x, player.y - 72, "#ffd45a", 18);
      } else if (item.type === "shield") {
        player.invincible = Math.max(player.invincible, 6);
        addFloater("SHIELD", player.x, player.y - 72, "#b7efff", 18);
      } else if (item.type === "haste") {
        player.speedTimer = 7;
        addFloater("SPEED", player.x, player.y - 72, "#c084fc", 18);
      }
      addScore(75, item.x, item.y - 28, "#55e080");
      spawnBurst(item.x, item.y, "#55e080", 18);
      playSound("item");
    }

    function updateGame(dt, realDt) {
      game.elapsed += realDt;
      game.timeLeft = Math.max(0, GAME_DURATION - game.elapsed);
      game.slowMo = Math.max(0, game.slowMo - realDt);
      game.shake = Math.max(0, game.shake - realDt * 18);
      game.flash = Math.max(0, game.flash - realDt * 1.9);

      if (game.timeLeft <= 0) {
        updateHud();
        endGame(true);
        return;
      }

      updatePlayer(dt, realDt);
      updateEnemies(dt, realDt);
      updateAttacks(realDt);
      updateItems(realDt);
      updateSpawning(realDt);
      updateEffects(realDt);
      updateHud();
    }

    function updatePlayer(dt, realDt) {
      const player = game.player;
      const move = getMoveVector();
      player.attackCooldown = Math.max(0, player.attackCooldown - realDt);
      player.attackPose = Math.max(0, player.attackPose - realDt);
      player.dashCooldown = Math.max(0, player.dashCooldown - realDt);
      player.hurtCooldown = Math.max(0, player.hurtCooldown - realDt);
      player.invincible = Math.max(0, player.invincible - realDt);
      player.powerTimer = Math.max(0, player.powerTimer - realDt);
      player.speedTimer = Math.max(0, player.speedTimer - realDt);

      if (game.comboTimer > 0) {
        game.comboTimer -= realDt;
        if (game.comboTimer <= 0) breakCombo();
      }

      if (player.dashTime > 0) {
        player.x += player.dashX * 540 * dt;
        player.y += player.dashY * 540 * dt;
        player.dashTime = Math.max(0, player.dashTime - realDt);
      } else {
        const speed = player.speed * (player.speedTimer > 0 ? 1.34 : 1);
        player.x += move.x * speed * dt;
        player.y += move.y * speed * dt;
      }

      if (move.x) player.facing = move.x < 0 ? -1 : 1;
      if (move.x || move.y || player.dashTime > 0) player.walk += realDt * 8.5;
      player.x = clamp(player.x, 34, W - 34);
      player.y = clamp(player.y, 128, H - 56);
    }

    function updateEnemies(dt, realDt) {
      const player = game.player;
      for (const enemy of game.enemies) {
        if (enemy.dead) continue;
        enemy.attackCooldown = Math.max(0, enemy.attackCooldown - realDt);
        enemy.hurt = Math.max(0, enemy.hurt - realDt);
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const len = Math.hypot(dx, dy) || 1;
        const nx = dx / len;
        const ny = dy / len;

        if (enemy.hurt <= 0 && len > enemy.radius + player.radius + 4) {
          enemy.x += nx * enemy.speed * dt;
          enemy.y += ny * enemy.speed * dt;
          enemy.walk += realDt * (enemy.type === "runner" ? 12 : 8);
        }

        if (len < enemy.radius + player.radius + 8 && enemy.attackCooldown <= 0) {
          enemy.attackCooldown = enemy.type === "runner" ? 0.72 : 0.9;
          damagePlayer(enemy.damage, enemy);
        }
      }
      game.enemies = game.enemies.filter((enemy) => !enemy.dead);
    }

    function updateAttacks(realDt) {
      const player = game.player;
      for (const attack of game.attacks) {
        attack.life -= realDt;
        for (const enemy of game.enemies) {
          if (enemy.dead || attack.hitIds.has(enemy.id)) continue;
          const dx = enemy.x - attack.x;
          const dy = enemy.y - attack.y;
          const hit = Math.hypot(dx, dy) < attack.radius + enemy.radius * 0.45;
          if (hit) {
            attack.hitIds.add(enemy.id);
            damageEnemy(enemy, attack.damage, attack.dirX, attack.dirY);
          }
        }
      }
      game.attacks = game.attacks.filter((attack) => attack.life > 0);
      if (player && player.attackPose <= 0) {
        player.attackDirX = player.facing;
        player.attackDirY = 0;
      }
    }

    function updateItems(realDt) {
      const player = game.player;
      for (const item of game.items) {
        item.life -= realDt;
        item.age += realDt;
        if (distance(player, item) < 32) {
          item.life = 0;
          applyItem(item);
        }
      }
      game.items = game.items.filter((item) => item.life > 0);
    }

    function updateSpawning(realDt) {
      const difficulty = clamp(game.elapsed / GAME_DURATION, 0, 1);
      game.spawnTimer -= realDt;
      if (game.spawnTimer <= 0) {
        let count = 1;
        if (difficulty > 0.54 && Math.random() < 0.34) count += 1;
        if (difficulty > 0.8 && Math.random() < 0.22) count += 1;
        for (let i = 0; i < count; i += 1) spawnEnemy();
        const base = clamp(1.28 - difficulty * 0.9, 0.34, 1.28);
        game.spawnTimer = rand(base * 0.72, base * 1.32);
      }

      game.itemTimer -= realDt;
      if (game.itemTimer <= 0) {
        spawnItem();
        game.itemTimer = rand(7, 12) - difficulty * 2.7;
      }
    }

    function updateEffects(realDt) {
      for (const p of game.particles) {
        p.life -= realDt;
        p.x += p.vx * realDt;
        p.y += p.vy * realDt;
        p.vx *= 0.96;
        p.vy = p.vy * 0.96 + 180 * realDt;
      }
      game.particles = game.particles.filter((p) => p.life > 0);

      for (const floater of game.floaters) {
        floater.life -= realDt;
        floater.y += floater.vy * realDt;
      }
      game.floaters = game.floaters.filter((floater) => floater.life > 0);

      // 스폰 경고 마커 업데이트
      if (game.spawnWarnings) {
        for (const w of game.spawnWarnings) {
          w.life -= realDt;
        }
        game.spawnWarnings = game.spawnWarnings.filter((w) => w.life > 0);
      }

      // 시간 경고 사운드 (10초, 5초, 3, 2, 1초 남았을 때)
      const t = Math.ceil(game.timeLeft);
      if (t !== game.lastTimeWarning && (t === 10 || t <= 5) && t > 0) {
        playSound("warning");
        game.lastTimeWarning = t;
      }
    }

    function addParticle(x, y, vx, vy, color, life, size) {
      game.particles.push({
        x,
        y,
        vx,
        vy,
        color,
        life,
        maxLife: life,
        size
      });
    }

    function spawnBurst(x, y, color, count) {
      for (let i = 0; i < count; i += 1) {
        const angle = rand(0, Math.PI * 2);
        const speed = rand(55, 230);
        addParticle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, color, rand(0.18, 0.46), rand(3, 7));
      }
    }

    function spawnArcParticles(x, y, dirX, dirY, color) {
      const angle = Math.atan2(dirY, dirX);
      for (let i = 0; i < 9; i += 1) {
        const a = angle + rand(-0.9, 0.9);
        const s = rand(80, 240);
        addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, color, rand(0.12, 0.24), rand(2, 5));
      }
    }

    function addFloater(text, x, y, color, size) {
      game.floaters.push({
        text,
        x,
        y,
        vy: rand(-58, -34),
        color,
        size,
        life: 0.92,
        maxLife: 0.92
      });
    }

    function updateHud() {
      const player = game.player;
      const hp = player ? Math.max(0, player.hp) : 100;
      const maxHp = player ? player.maxHp : 100;
      const hpPct = clamp((hp / maxHp) * 100, 0, 100);

      els.healthFill.style.width = hpPct + "%";
      els.healthFill.style.background = hpPct < 35
        ? "linear-gradient(90deg,#ff1a1a,#ff8800)"
        : "linear-gradient(90deg,#25d366,#c9f75b)";
      els.healthText.textContent = Math.ceil(hp);

      els.scoreText.textContent = formatScore(game.score);
      els.bestText.textContent = formatScore(bestScore);

      // 시간 - 10초 이하 깜빡임
      const tSec = Math.ceil(game.timeLeft);
      els.timeVal.textContent = tSec;
      els.timeVal.classList.toggle("warning", tSec <= 10 && game.mode === "playing");

      // 콤보 - 5이상 강조
      els.comboVal.textContent = "x" + game.combo;
      els.comboVal.classList.toggle("hot", game.combo >= 5);

      // 순위 - Top5 안에 들면 금색 강조
      const rank = getCurrentRank(game.score);
      if (els.rankVal) {
        if (rank === -1) {
          els.rankVal.textContent = "-";
          els.rankVal.classList.remove("rank-top");
        } else {
          els.rankVal.textContent = "#" + rank;
          els.rankVal.classList.toggle("rank-top", rank <= 3);
        }
      }
    }

    function draw() {
      // 인트로 화면은 별도 렌더러
      if (game.mode === "intro") {
        drawIntro();
        return;
      }

      ctx.save();
      if (game.mode === "playing" && game.shake > 0) {
        ctx.translate(rand(-game.shake, game.shake), rand(-game.shake, game.shake));
      }

      drawBackground();

      if (game.player) {
        drawItems();
        drawCharacters();
        drawAttacks();
        drawParticles();
        drawFloaters();
        drawBuffLabels();
      } else {
        drawAttractScene();
      }

      ctx.restore();

      if (game.flash > 0) {
        ctx.fillStyle = "rgba(255, 50, 50, " + game.flash * 0.28 + ")";
        ctx.fillRect(0, 0, W, H);
      }
    }

    // ============================================================
    // INTRO SCENE STATE
    // ============================================================
    const intro = {
      t: 0,           // 누적 시간(초)
      phase: 0,       // 0=암전→배경, 1=타이틀 등장, 2=캐릭터 등장, 3=루프
      blink: 0,       // PRESS ANY KEY 깜빡임
      particles: [],  // 인트로 전용 파티클
      stickmen: [],   // 배경 스틱맨 실루엣들
      titleY: -120,   // 타이틀 드롭 위치
      titleVY: 0,
      titleLanded: false,
      shockwave: 0,   // 타이틀 착지 충격파
      redFlash: 0,    // 번쩍
      player: { x: W * 0.38, y: H * 0.62, facing: 1, walk: 0, attack: 0 },
      enemies: [
        { x: W * 0.72, y: H * 0.60, facing: -1, walk: 0, state: "idle", stateT: 0, color: "#d92d20" },
        { x: W * 0.82, y: H * 0.64, facing: -1, walk: 0, state: "idle", stateT: 1.2, color: "#f97316" },
        { x: W * 0.68, y: H * 0.67, facing: -1, walk: 0, state: "idle", stateT: 0.6, color: "#cc00aa" }
      ],
      logoGlow: 0
    };

    function spawnIntroPart(x, y, color, vx, vy) {
      if (intro.particles.length > 60) return;
      intro.particles.push({ x, y, vx, vy, life: 1.0, color, size: 2 + Math.random() * 4 });
    }

    function updateIntro(dt) {
      intro.t += dt;
      intro.blink += dt;

      // 타이틀 드롭 물리
      if (!intro.titleLanded) {
        intro.titleVY += 900 * dt;
        intro.titleY += intro.titleVY * dt;
        const landY = H * 0.28;
        if (intro.titleY >= landY) {
          intro.titleY = landY;
          intro.titleVY = 0;
          intro.titleLanded = true;
          intro.shockwave = 1.0;
          intro.redFlash = 0.8;
          // 착지 파티클 폭발
          for (let i = 0; i < 30; i++) {
            const ang = Math.random() * Math.PI * 2;
            const spd = 80 + Math.random() * 200;
            spawnIntroPart(W / 2, landY + 30, i % 3 === 0 ? "#ff1a1a" : "#fff", Math.cos(ang) * spd, Math.sin(ang) * spd - 100);
          }
        }
      }

      // 충격파 감쇠
      if (intro.shockwave > 0) intro.shockwave -= dt * 2.5;
      if (intro.redFlash > 0) intro.redFlash -= dt * 3;

      // 인트로 파티클 업데이트
      for (let i = intro.particles.length - 1; i >= 0; i--) {
        const p = intro.particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 280 * dt;
        p.vx *= 0.98;
        p.life -= dt * 1.2;
        if (p.life <= 0) intro.particles.splice(i, 1);
      }

      // 플레이어 스틱맨 - 공격 포즈 반복
      intro.player.walk += dt * 6;
      intro.player.attack = Math.max(0, intro.player.attack - dt * 3);
      if (intro.t > 1.5 && intro.t % 1.8 < 0.18 && intro.player.attack <= 0) {
        intro.player.attack = 1.0;
        for (let i = 0; i < 8; i++) {
          const ang = -0.5 + Math.random() * 1.0;
          spawnIntroPart(intro.player.x + 60, intro.player.y - 25, "#ffd45a", Math.cos(ang) * 150, Math.sin(ang) * 80 - 60);
        }
      }

      // 적 스틱맨 - 비틀거리다 날아가는 연출
      for (const e of intro.enemies) {
        e.walk += dt * 4;
        e.stateT += dt;
        if (e.state === "idle" && e.stateT > 2.0) {
          e.state = "hurt";
          e.stateT = 0;
          e.vx = 120 + Math.random() * 80;
          e.vy = -(80 + Math.random() * 60);
        }
        if (e.state === "hurt") {
          e.x += (e.vx || 0) * dt;
          e.y += (e.vy || 0) * dt;
          e.vy = (e.vy || 0) + 300 * dt;
          e.stateT += dt;
          // 화면 밖 나가면 리셋
          if (e.x > W + 80 || e.y > H + 80) {
            e.x = W * (0.68 + Math.random() * 0.18);
            e.y = H * (0.60 + Math.random() * 0.08);
            e.state = "idle";
            e.stateT = Math.random() * 1.2;
            e.vx = 0; e.vy = 0;
          }
        }
      }

      // 로고 글로우 펄스
      intro.logoGlow = 0.6 + Math.sin(intro.t * 3) * 0.4;
    }

    // 인트로 스틱맨 그리기 (간략 버전)
    function drawIntroStick(x, y, color, facing, walk, attackProg, lineW) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = lineW || 4;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      const w = Math.sin(walk * 2.4);
      const headY = y - 44;

      // 그림자
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.beginPath();
      ctx.ellipse(x, y + 4, 18, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // 머리
      ctx.beginPath();
      ctx.arc(x, headY, lineW ? 13 : 11, 0, Math.PI * 2);
      ctx.stroke();

      // 몸
      ctx.beginPath();
      ctx.moveTo(x, y - 32); ctx.lineTo(x, y + 4); ctx.stroke();

      // 팔
      if (attackProg > 0) {
        const reach = 32 * Math.sin(attackProg * Math.PI);
        ctx.beginPath();
        ctx.moveTo(x, y - 20);
        ctx.lineTo(x + facing * (18 + reach), y - 20 - reach * 0.4);
        ctx.moveTo(x, y - 20);
        ctx.lineTo(x - facing * 14, y - 14);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(x, y - 20);
        ctx.lineTo(x + facing * (18 + w * 6), y - 8 + w * 3);
        ctx.moveTo(x, y - 20);
        ctx.lineTo(x - facing * (14 - w * 6), y - 8 - w * 3);
        ctx.stroke();
      }

      // 다리
      ctx.beginPath();
      ctx.moveTo(x, y + 4);
      ctx.lineTo(x + facing * (10 + w * 10), y + 32);
      ctx.moveTo(x, y + 4);
      ctx.lineTo(x - facing * (10 - w * 10), y + 32);
      ctx.stroke();

      ctx.restore();
    }

    function drawIntro() {
      const t = intro.t;

      // ── 배경 ──
      // 깊은 어두움 → 핏빛 드라마틱 배경
      const bg = ctx.createRadialGradient(W / 2, H * 0.5, 60, W / 2, H * 0.5, W * 0.8);
      bg.addColorStop(0, "#200508");
      bg.addColorStop(0.5, "#0f0205");
      bg.addColorStop(1, "#050002");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // 배경 방사형 라이트 빔 (드라마틱)
      ctx.save();
      for (let i = 0; i < 12; i++) {
        const ang = (i / 12) * Math.PI * 2 + t * 0.08;
        const alpha = 0.03 + (i % 3 === 0 ? 0.04 : 0);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "#ff1a1a";
        ctx.beginPath();
        ctx.moveTo(W / 2, H * 0.28);
        ctx.lineTo(W / 2 + Math.cos(ang) * W * 1.5, H * 0.28 + Math.sin(ang) * H * 1.5);
        ctx.lineTo(W / 2 + Math.cos(ang + 0.18) * W * 1.5, H * 0.28 + Math.sin(ang + 0.18) * H * 1.5);
        ctx.closePath();
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();

      // 바닥 원근 격자
      ctx.save();
      ctx.strokeStyle = "rgba(255,30,30,0.12)";
      ctx.lineWidth = 1;
      const horizon = H * 0.52;
      const vp = { x: W / 2, y: horizon };
      // 수평선
      for (let y = horizon; y < H; y += 28) {
        const alpha = (y - horizon) / (H - horizon);
        ctx.globalAlpha = 0.08 + alpha * 0.18;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // 투시선
      for (let i = 0; i <= 14; i++) {
        const fx = (i / 14) * W;
        ctx.globalAlpha = 0.1;
        ctx.beginPath();
        ctx.moveTo(vp.x, vp.y);
        ctx.lineTo(fx, H);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.restore();

      // 지평선 붉은 라인
      ctx.save();
      const hGrad = ctx.createLinearGradient(0, 0, W, 0);
      hGrad.addColorStop(0, "rgba(255,0,0,0)");
      hGrad.addColorStop(0.3, "rgba(255,26,26,0.8)");
      hGrad.addColorStop(0.7, "rgba(255,26,26,0.8)");
      hGrad.addColorStop(1, "rgba(255,0,0,0)");
      ctx.fillStyle = hGrad;
      ctx.fillRect(0, horizon - 1, W, 2);
      ctx.restore();

      // 배경 실루엣 스틱맨들 (군중 느낌)
      ctx.save();
      const silCount = 18;
      for (let i = 0; i < silCount; i++) {
        const sx = (i / silCount) * W * 1.1 - W * 0.05;
        const sy = horizon + 18 + (i % 3) * 8;
        const scale = 0.5 + (i % 4) * 0.08;
        const alpha = 0.12 + (i % 3) * 0.06;
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = "#ff2200";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        // 단순 실루엣 (머리+몸만)
        ctx.beginPath();
        ctx.arc(sx, sy - 22 * scale, 8 * scale, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(sx, sy - 14 * scale);
        ctx.lineTo(sx, sy + 10 * scale);
        ctx.moveTo(sx, sy - 4 * scale);
        ctx.lineTo(sx - 10 * scale, sy + 4 * scale);
        ctx.moveTo(sx, sy - 4 * scale);
        ctx.lineTo(sx + 10 * scale, sy + 4 * scale);
        ctx.moveTo(sx, sy + 10 * scale);
        ctx.lineTo(sx - 7 * scale, sy + 28 * scale);
        ctx.moveTo(sx, sy + 10 * scale);
        ctx.lineTo(sx + 7 * scale, sy + 28 * scale);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.restore();

      // ── 인트로 파티클 ──
      for (const p of intro.particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life) * 0.9;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // ── 적 스틱맨들 ──
      for (const e of intro.enemies) {
        ctx.save();
        if (e.state === "hurt") {
          ctx.globalAlpha = Math.max(0, 1 - e.stateT * 1.5);
          // 날아가는 회전
          ctx.translate(e.x, e.y);
          ctx.rotate(e.stateT * 5);
          ctx.translate(-e.x, -e.y);
        }
        drawIntroStick(e.x, e.y, e.color, e.facing, e.walk, 0, 3.5);
        ctx.restore();
      }

      // ── 플레이어 스틱맨 (주인공, 더 크고 밝게) ──
      const px = intro.player.x;
      const py = intro.player.y;
      // 글로우
      ctx.save();
      ctx.globalAlpha = 0.25 + Math.sin(t * 4) * 0.1;
      ctx.fillStyle = "#38bdf8";
      ctx.shadowColor = "#38bdf8";
      ctx.shadowBlur = 30;
      ctx.beginPath();
      ctx.arc(px, py - 25, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // 공격 이펙트 링
      if (intro.player.attack > 0.3) {
        ctx.save();
        ctx.globalAlpha = (intro.player.attack - 0.3) / 0.7 * 0.8;
        ctx.strokeStyle = "#ffd45a";
        ctx.lineWidth = 4;
        ctx.shadowColor = "#ffd45a";
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(px + 55, py - 20, 25 * (1 - intro.player.attack * 0.5), 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
      drawIntroStick(px, py, "#e8f4ff", 1, intro.player.walk, intro.player.attack, 5.5);

      // ── 착지 충격파 ──
      if (intro.shockwave > 0) {
        const sw = 1 - intro.shockwave;
        ctx.save();
        ctx.globalAlpha = intro.shockwave * 0.7;
        ctx.strokeStyle = "#ff1a1a";
        ctx.lineWidth = 3;
        ctx.shadowColor = "#ff1a1a";
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(W / 2, H * 0.28 + 30, sw * 220, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = intro.shockwave * 0.4;
        ctx.beginPath();
        ctx.arc(W / 2, H * 0.28 + 30, sw * 320, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      // ── 타이틀 텍스트 ──
      const titleAlpha = clamp((t - 0.2) / 0.5, 0, 1);
      if (titleAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = titleAlpha;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const ty = intro.titleY;

        // 배경 판 (타이틀 뒤 어두운 사각형)
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(W / 2 - 340, ty - 52, 680, 104);

        // STICK 텍스트
        ctx.font = "900 88px 'Trebuchet MS', Impact, Arial Black, sans-serif";
        ctx.shadowColor = "#ff1a1a";
        ctx.shadowBlur = intro.titleLanded ? 30 * intro.logoGlow : 0;
        ctx.fillStyle = "#ffffff";
        ctx.fillText("STICK", W / 2 - 158, ty);

        // RUSH 텍스트 (빨간색 강조)
        ctx.fillStyle = "#ff1a1a";
        ctx.shadowColor = "#ff0000";
        ctx.shadowBlur = intro.titleLanded ? 40 * intro.logoGlow : 0;
        ctx.fillText("RUSH", W / 2 + 128, ty);

        // ARENA 서브타이틀
        ctx.font = "900 28px 'Trebuchet MS', Arial, sans-serif";
        ctx.fillStyle = "#ffd45a";
        ctx.shadowColor = "#ffd45a";
        ctx.shadowBlur = intro.titleLanded ? 18 * intro.logoGlow : 0;
        ctx.letterSpacing = "14px";
        ctx.fillText("— A R E N A —", W / 2, ty + 54);

        // 타이틀 착지 후 수직선 장식
        if (intro.titleLanded) {
          ctx.globalAlpha = titleAlpha * 0.6;
          ctx.strokeStyle = "#ff1a1a";
          ctx.lineWidth = 2;
          ctx.shadowBlur = 8;
          ctx.shadowColor = "#ff1a1a";
          ctx.beginPath();
          ctx.moveTo(W / 2 - 340, ty - 52); ctx.lineTo(W / 2 - 340, ty + 52);
          ctx.moveTo(W / 2 + 340, ty - 52); ctx.lineTo(W / 2 + 340, ty + 52);
          ctx.stroke();
          // 상하 가로선
          ctx.globalAlpha = titleAlpha * 0.4;
          ctx.beginPath();
          ctx.moveTo(W / 2 - 340, ty - 52); ctx.lineTo(W / 2 + 340, ty - 52);
          ctx.moveTo(W / 2 - 340, ty + 52); ctx.lineTo(W / 2 + 340, ty + 52);
          ctx.stroke();
        }

        ctx.restore();
      }

      // ── 조작법 설명 (타이틀 착지 후 페이드인) ──
      const infoAlpha = clamp((t - 1.8) / 0.8, 0, 1);
      if (infoAlpha > 0 && intro.titleLanded) {
        ctx.save();
        ctx.globalAlpha = infoAlpha;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const iy = H * 0.79;
        // 조작법 배경 바
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.strokeStyle = "rgba(255,30,30,0.4)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(W / 2 - 330, iy - 22, 660, 44, 6);
        ctx.fill();
        ctx.stroke();

        ctx.font = "800 13px 'Trebuchet MS', Arial, sans-serif";
        ctx.fillStyle = "rgba(255,200,200,0.85)";
        ctx.fillText("WASD 이동  ·  SPACE 공격  ·  SHIFT 대시  ·  90초 생존하면 승리", W / 2, iy);
        ctx.restore();
      }

      // ── PRESS ANY KEY (착지 + 1.2초 후 등장, 깜빡임) ──
      const keyAlpha = clamp((t - 2.2) / 0.6, 0, 1);
      if (keyAlpha > 0 && intro.titleLanded) {
        const blink = Math.sin(intro.blink * Math.PI * 2.2) > 0 ? 1 : 0.2;
        ctx.save();
        ctx.globalAlpha = keyAlpha * blink;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 20px 'Trebuchet MS', Arial, sans-serif";
        ctx.fillStyle = "#fff";
        ctx.shadowColor = "#fff";
        ctx.shadowBlur = 12;
        ctx.fillText("▶  PRESS ANY KEY TO START  ◀", W / 2, H * 0.895);
        ctx.restore();
      }

      // ── 빨간 번쩍임 (착지 시) ──
      if (intro.redFlash > 0) {
        ctx.save();
        ctx.globalAlpha = intro.redFlash * 0.35;
        ctx.fillStyle = "#ff0000";
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      // ── 외곽 비네트 ──
      const vig = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.8);
      vig.addColorStop(0, "rgba(0,0,0,0)");
      vig.addColorStop(1, "rgba(0,0,0,0.75)");
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      // ── 최고점수 표시 (우상단 작게) ──
      if (bestScore > 0) {
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.textAlign = "right";
        ctx.textBaseline = "top";
        ctx.font = "700 13px 'Trebuchet MS', Arial, sans-serif";
        ctx.fillStyle = "#ffd45a";
        ctx.fillText("BEST  " + formatScore(bestScore), W - 16, 14);
        ctx.restore();
      }
    }

    function drawBackground() {
      // 어두운 콘크리트 바닥 + 핏빛 비네트
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#1a0508");
      sky.addColorStop(0.34, "#0f0307");
      sky.addColorStop(0.36, "#1a0a0c");
      sky.addColorStop(1, "#0a0408");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      // 위쪽 어두운 안개 영역 (관중석 같은 느낌)
      ctx.save();
      ctx.fillStyle = "rgba(255, 30, 30, 0.04)";
      for (let i = 0; i < 8; i += 1) {
        const x = (i * 137) % W;
        const r = 30 + (i % 3) * 20;
        ctx.beginPath();
        ctx.arc(x, 50 + (i % 2) * 40, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      // 지평선 라인 (붉은 실선)
      ctx.fillStyle = "#ff1a1a";
      ctx.fillRect(0, 108, W, 2);
      ctx.fillStyle = "rgba(255, 30, 30, 0.15)";
      ctx.fillRect(0, 110, W, 4);

      // 바닥 격자 - 어두운 콘크리트 느낌
      ctx.save();
      ctx.strokeStyle = "rgba(255, 60, 60, 0.12)";
      ctx.lineWidth = 1.5;
      // 가로선 - 원근감
      for (let y = 130; y < H; y += 32) {
        const alpha = (y - 130) / (H - 130);
        ctx.globalAlpha = 0.15 + alpha * 0.25;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // 원근 사선 (위→아래 퍼지는 격자)
      ctx.strokeStyle = "rgba(255, 50, 50, 0.08)";
      ctx.lineWidth = 1;
      for (let x = -120; x < W + 160; x += 70) {
        ctx.beginPath();
        ctx.moveTo(x, 116);
        ctx.lineTo(x + 200, H);
        ctx.stroke();
      }
      for (let x = 40; x < W + 160; x += 80) {
        ctx.beginPath();
        ctx.moveTo(x, 116);
        ctx.lineTo(x - 200, H);
        ctx.stroke();
      }
      ctx.restore();

      // 바닥 균열 (정적, 매번 같은 위치)
      ctx.save();
      ctx.strokeStyle = "rgba(0, 0, 0, 0.5)";
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      const cracks = [
        [[140, 230], [180, 280], [165, 340], [220, 380]],
        [[680, 200], [720, 240], [760, 290], [780, 360]],
        [[400, 410], [450, 440], [430, 480]],
        [[60, 350], [100, 380], [140, 410]]
      ];
      for (const crack of cracks) {
        ctx.beginPath();
        ctx.moveTo(crack[0][0], crack[0][1]);
        for (let i = 1; i < crack.length; i += 1) {
          ctx.lineTo(crack[i][0], crack[i][1]);
        }
        ctx.stroke();
      }
      ctx.restore();

      // 핏자국 (어두운 빨강 얼룩, 정적)
      ctx.save();
      ctx.fillStyle = "rgba(80, 0, 5, 0.55)";
      const blood = [
        [200, 320, 28], [550, 380, 35], [820, 280, 22],
        [350, 250, 25], [120, 450, 30], [700, 460, 26]
      ];
      for (const b of blood) {
        ctx.beginPath();
        ctx.ellipse(b[0], b[1], b[2], b[2] * 0.6, Math.random() * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      // 위험 경고 라벨 (배경에 박힌 느낌)
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = "#ff1a1a";
      ctx.font = "900 64px Trebuchet MS, Arial";
      ctx.textAlign = "center";
      ctx.fillText("⚠ DANGER ZONE ⚠", W / 2, 78);
      ctx.restore();

      // 시간이 지날수록 강해지는 핏빛 비네트
      const danger = clamp(game.elapsed / GAME_DURATION, 0, 1);
      const lowHp = game.player ? clamp(1 - game.player.hp / game.player.maxHp, 0, 1) : 0;
      const intensity = Math.max(danger * 0.5, lowHp * 0.85);

      if (intensity > 0.05) {
        const vig = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.7);
        vig.addColorStop(0, "rgba(255, 0, 0, 0)");
        vig.addColorStop(1, "rgba(180, 0, 0, " + (intensity * 0.55) + ")");
        ctx.fillStyle = vig;
        ctx.fillRect(0, 0, W, H);
      }

      // HP 위급 시 추가 펄스 비네트
      if (game.player && game.player.hp < 30 && game.mode === "playing") {
        const pulse = 0.3 + Math.sin(performance.now() * 0.012) * 0.2;
        ctx.fillStyle = "rgba(255, 0, 0, " + (pulse * 0.25) + ")";
        ctx.fillRect(0, 0, W, H);
      }

      // 시간 부족 시 화면 가장자리 빨간 테두리 강조
      if (game.timeLeft <= 15 && game.mode === "playing") {
        const pulse = 0.4 + Math.sin(performance.now() * 0.015) * 0.4;
        ctx.strokeStyle = "rgba(255, 0, 0, " + pulse + ")";
        ctx.lineWidth = 8;
        ctx.strokeRect(4, 4, W - 8, H - 8);
      }

      // 외곽 테두리
      ctx.strokeStyle = "#1a0205";
      ctx.lineWidth = 6;
      ctx.strokeRect(3, 3, W - 6, H - 6);

      // 적 스폰 경고 마커 그리기
      drawSpawnWarnings();
    }

    function drawSpawnWarnings() {
      if (!game.spawnWarnings) return;
      for (const w of game.spawnWarnings) {
        const t = 1 - w.life / w.maxLife;
        const pulse = 0.5 + Math.sin(performance.now() * 0.025) * 0.5;
        ctx.save();
        ctx.globalAlpha = pulse * (1 - t * 0.3);
        ctx.strokeStyle = "#ff1a1a";
        ctx.lineWidth = 3;
        // 깜빡이는 화살표/마커
        ctx.translate(w.x, w.y);
        ctx.rotate(w.angle);
        ctx.beginPath();
        ctx.moveTo(-14, -8);
        ctx.lineTo(0, 0);
        ctx.lineTo(-14, 8);
        ctx.lineTo(-10, 0);
        ctx.closePath();
        ctx.stroke();
        ctx.fillStyle = "rgba(255, 26, 26, 0.4)";
        ctx.fill();
        // 외곽 원
        ctx.rotate(-w.angle);
        ctx.beginPath();
        ctx.arc(0, 0, 18 + t * 8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawAttractScene() {
      const t = performance.now() * 0.002;
      const demoPlayer = { x: W / 2 - 90, y: H / 2 + 112, walk: t * 2, facing: 1, attackPose: 0.8, attackDirX: 1, attackDirY: 0, invincible: 0, powerTimer: 1, speedTimer: 0 };
      const demoEnemy = { x: W / 2 + 92 + Math.sin(t * 2) * 8, y: H / 2 + 112, walk: t * 2, facing: -1, hurt: 0, color: "#d92d20", type: "normal", hp: 30, maxHp: 50 };
      drawStickman(demoEnemy, false);
      drawStickman(demoPlayer, true);
      ctx.save();
      ctx.globalAlpha = 0.62 + Math.sin(t * 7) * 0.18;
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(W / 2 + 5, H / 2 + 82, 58, -0.55, 0.55);
      ctx.stroke();
      ctx.restore();
    }

    function drawItems() {
      const colorByType = {
        heal: "#55e080",
        power: "#ffd45a",
        shield: "#38bdf8",
        haste: "#c084fc"
      };
      const labelByType = {
        heal: "+",
        power: "P",
        shield: "S",
        haste: ">"
      };
      for (const item of game.items) {
        const pulse = Math.sin((item.age || 0) * 8) * 3;
        ctx.save();
        ctx.translate(item.x, item.y);
        ctx.globalAlpha = clamp(item.life / 0.6, 0.25, 1);
        ctx.fillStyle = "rgba(17, 19, 24, 0.18)";
        ctx.beginPath();
        ctx.ellipse(0, 18, 18, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = colorByType[item.type];
        ctx.strokeStyle = "#111318";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(-14 - pulse * 0.2, -14 - pulse * 0.2, 28 + pulse * 0.4, 28 + pulse * 0.4, 5);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#111318";
        ctx.font = "900 18px Trebuchet MS, Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(labelByType[item.type], 0, 1);
        ctx.restore();
      }
    }

    function drawCharacters() {
      const actors = [...game.enemies, game.player].filter(Boolean).sort((a, b) => a.y - b.y);
      for (const actor of actors) {
        drawStickman(actor, actor === game.player);
      }
    }

    function drawStickman(actor, isPlayer) {
      const x = actor.x;
      const y = actor.y;
      const walk = Math.sin((actor.walk || 0) * 2.4);
      const hurt = actor.hurt > 0;
      const facing = isPlayer ? actor.facing : actor.facing || (game.player && actor.x > game.player.x ? -1 : 1);
      // 어두운 배경 - 플레이어는 흰색, 적은 본인 색
      const bodyColor = hurt ? "#fff" : (isPlayer ? "#f0f4ff" : (actor.color || "#ff4d4d"));
      const accent = isPlayer ? "#38bdf8" : actor.color || "#d92d20";
      const alpha = isPlayer && actor.invincible > 0 && Math.floor(performance.now() / 70) % 2 === 0 ? 0.5 : 1;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      // 그림자 (어두운 바닥에 검은 그림자)
      ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
      ctx.beginPath();
      ctx.ellipse(x, y + 32, isPlayer ? 24 : 21, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      // 캐릭터 외곽 글로우 (어두운 배경에서 윤곽 선명하게)
      if (isPlayer) {
        ctx.shadowColor = actor.powerTimer > 0 ? "#ffd45a" : "#38bdf8";
        ctx.shadowBlur = 12;
      } else {
        ctx.shadowColor = actor.color || "#ff4d4d";
        ctx.shadowBlur = 8;
      }

      if (isPlayer && actor.invincible > 0) {
        ctx.globalAlpha = alpha * 0.4;
        ctx.shadowBlur = 0;
        ctx.strokeStyle = actor.powerTimer > 0 ? "#ffd45a" : "#38bdf8";
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.arc(x, y - 12, 45 + Math.sin(performance.now() * 0.01) * 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = alpha;
      }

      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = isPlayer ? 5 : actor.type === "brute" ? 6 : 4.5;

      const headY = y - 42;
      // 머리 - 플레이어는 흰색, 적은 본인 색깔의 어두운 버전
      ctx.fillStyle = isPlayer ? "#f0f4ff" : (actor.color || "#d92d20");
      ctx.beginPath();
      ctx.arc(x, headY, isPlayer ? 12 : actor.type === "brute" ? 13 : 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // 헤드밴드 / 스카프 (액센트)
      ctx.shadowBlur = 0;
      ctx.strokeStyle = accent;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x - 11, headY - 5);
      ctx.lineTo(x + 11, headY - 8);
      ctx.stroke();

      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = isPlayer ? 5 : actor.type === "brute" ? 6 : 4.5;
      ctx.beginPath();
      ctx.moveTo(x, y - 30);
      ctx.lineTo(x, y + 6);
      ctx.stroke();

      const shoulderY = y - 18;
      const armSwing = walk * 5;
      ctx.beginPath();
      if (isPlayer && actor.attackPose > 0) {
        ctx.moveTo(x, shoulderY);
        ctx.lineTo(x + actor.attackDirX * 34, shoulderY + actor.attackDirY * 24);
        ctx.moveTo(x, shoulderY);
        ctx.lineTo(x - actor.attackDirX * 17, shoulderY + 12);
      } else {
        ctx.moveTo(x, shoulderY);
        ctx.lineTo(x + facing * (18 + armSwing), shoulderY + 13);
        ctx.moveTo(x, shoulderY);
        ctx.lineTo(x - facing * (15 - armSwing), shoulderY + 13);
      }
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x, y + 6);
      ctx.lineTo(x + facing * (12 + walk * 5), y + 32);
      ctx.moveTo(x, y + 6);
      ctx.lineTo(x - facing * (13 - walk * 5), y + 32);
      ctx.stroke();

      if (!isPlayer) {
        const hpPct = clamp(actor.hp / actor.maxHp, 0, 1);
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(x - 18, y - 64, 36, 5);
        ctx.fillStyle = hpPct > 0.4 ? "#55e080" : "#ff4d4d";
        ctx.fillRect(x - 18, y - 64, 36 * hpPct, 5);
      }
      ctx.restore();
    }

    function drawAttacks() {
      for (const attack of game.attacks) {
        const progress = 1 - attack.life / attack.maxLife;
        const alpha = clamp(attack.life / attack.maxLife, 0, 1);
        const angle = Math.atan2(attack.dirY, attack.dirX);
        ctx.save();
        ctx.translate(attack.x, attack.y);
        ctx.rotate(angle);
        ctx.globalAlpha = alpha;
        // 외곽 흰색 글로우
        ctx.shadowColor = "#fff";
        ctx.shadowBlur = 12;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.95)";
        ctx.lineWidth = 12;
        ctx.beginPath();
        ctx.arc(0, 0, attack.radius * (0.72 + progress * 0.34), -0.78, 0.78);
        ctx.stroke();
        // 내부 색상선 (파워 시 노랑, 평소 시안)
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255, 200, 50, 0.95)";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(0, 0, attack.radius * (0.72 + progress * 0.32), -0.68, 0.68);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of game.particles) {
        const alpha = clamp(p.life / p.maxLife, 0, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawFloaters() {
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      for (const floater of game.floaters) {
        const alpha = clamp(floater.life / floater.maxLife, 0, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
